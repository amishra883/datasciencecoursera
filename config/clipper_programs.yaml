# Aggregate summary
summary:
  total_candidates: 10
  verified_open: 5
  verified_closed: 0
  unverified: 5
  spec_conflicts_total: 9
  notes: >
    Five creators verified as having open / publicly-documented clipper
    programs accessible via Whop or a public Discord submission portal:
    Kai Cenat, IShowSpeed, Adin Ross (joint w/ N3on), Sketch, and Jynxzi.

    Five marked unverified after 2-3 searches: Plaqueboymax, Agent00,
    Stableronaldo, Duke Dennis, Fanum. There is heavy unofficial clipping
    activity around all five, but no first-party paid program was found.
    NOTABLY: there is NO unified AMP collective clipper program — only
    Kai Cenat (an AMP member) has an individual program; Fanum, Duke
    Dennis, and Agent00 (also AMP members) do not.

    Most common spec conflicts across verified-open programs:

      1. Whop campaign briefs are Cloudflare-gated (HTTP 403 to WebFetch),
         meaning we cannot pre-verify per-campaign attribution / exclusivity
         / prohibited-content rules. Operator should manually visit each
         campaign page and capture the brief before relying on the license.
         Affects: Kai Cenat, IShowSpeed, Sketch, Jynxzi.

      2. The "submit-within-1-hour" Whop default may conflict with our
         pipeline latency (4h Scout cadence + edit + AI script + visuals
         + compliance gate). May force us to either run a tighter loop for
         these creators, or accept that we miss the submission window and
         rely on platform monetization only (forfeiting the clipper
         payout). Affects: Kai Cenat, IShowSpeed.

      3. Source content controversy / sponsorship pollution: Adin Ross
         (gambling promos, political content), Jynxzi (Juicy Drop
         sponsored stream is itself an ad). Compliance must filter
         monetization-ineligible segments and apply FTC #ad disclosure on
         re-uploaded sponsored content. Affects: Adin Ross, Jynxzi.

    Red flags for Phase 0.2 (creator selection):

      - Sketch's reported $0.35 per 1k views (if accurate) is below typical
        streamer-campaign rates — re-verify the actual brief; if true,
        economics likely don't justify pipeline cost.
      - Adin Ross program is Discord-gated; we cannot pre-verify exclusivity
        / attribution rules without joining Discord and reading the brief.
      - 5 of 10 candidates are unverified; the spec's "≥10 candidates" target
        is reduced to a working pool of 5. Phase 0.2 ranking should be done
        only across the 5 verified-open creators.

    Re-verify all entries on 2026-06-14 per the Legal & Risk Register's
    "monthly re-verification" requirement.
