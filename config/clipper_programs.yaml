# Phase 0.1 — Open clipper programs verification
# Capture date: 2026-05-14
# Re-verify monthly per CLAUDE.md "Legal & risk register"
#
# Methodology notes:
#   - Primary sources for most creators are Whop / Content Rewards campaign pages,
#     which return HTTP 403 to WebFetch (Cloudflare-gated). Where we could not
#     fetch the campaign brief itself, we did NOT extract specific rules; we
#     captured the URL plus what 3rd-party reporting (Dexerto, Tubefilter,
#     Complex, Variety, Whop's own blog) confirms publicly, and flagged the
#     rest as `unknown` rather than guessing.
#   - "verified_open" means: we found a public, currently-live primary surface
#     (Whop campaign page, dedicated submission portal, or repeated 1st-party
#     reporting) confirming the program is open for new clippers.
#   - "unverified" means: we could not find a primary source after 2-3 searches.
#   - Several creators are AMP members (Kai Cenat, Fanum, Duke Dennis, Agent00).
#     We could NOT find a unified AMP-collective clipper program — only
#     individual programs (Kai Cenat has one; the others appear in 3rd-party
#     hub campaigns like DracoSlides but not as 1st-party programs).

programs:
  - creator: Kai Cenat
    status: verified_open
    source_url: https://whop.com/discover/kai-cenat-clips-15/
    capture_date: 2026-05-14
    program_name: "Kai Cenat clips (Whop Content Rewards campaign)"
    rules:
      - "Source: Kai Cenat livestream / VOD content"
      - "Per Whop Content Rewards platform mechanics: clip, post to allowed platform, then submit the post URL within ~1 hour of posting"
      - "Campaign-specific brief on Whop dictates hook style, hashtags, watermarks (not retrievable via WebFetch — 403 gated)"
    allowed_platforms: [tiktok, instagram_reels, youtube_shorts, x]
    attribution_required: "unknown — campaign-brief gated; Whop campaigns commonly require @mention or watermark"
    exclusivity: "unknown — Whop campaigns typically allow cross-posting across listed platforms but cap per-clip payout"
    payout:
      model: cpm
      rate: "~$2 per 1,000 verified views (per Variety + clippa.net reporting on the Kai Cenat Whop campaign); subject to per-clip and total monthly budget caps"
    prohibited_content:
      - "unknown — campaign brief not retrievable; Whop platform-wide rules ban hate, sexual, deceptive, or copyright-infringing content"
    spec_conflicts:
      - "Submit-within-1-hour rule may conflict with our pipeline latency (Scout 4h cadence + Editor + Writer + Visuals + Compliance gate). Need to verify whether 1h applies to Kai Cenat's specific campaign or is a Whop default."
      - "Attribution / watermark requirements (if present) need to be confirmed before we can guarantee compliance."
    notes: >
      Kai Cenat's official site (kaicenat.com/streamclips) also exists but
      WebFetch returned 403; appears to be a clip showcase page rather than
      a clipper-recruitment portal. The Whop campaign is the primary
      monetized program. Multiple secondary sources (Variety 2026 piece,
      clippa.net, Whop's own blog post on Kai Cenat clips) corroborate the
      program is active.

