# Phase 0.2 — Top-5 creator rankings by aggregate views
# Capture date: 2026-05-14
# Re-run monthly per CLAUDE.md "Phase 0.2"
# Methodology: sum public view counts across Twitch (30d), YouTube (90d),
# TikTok (30d), Instagram (30d). Rank by total.
#
# IMPORTANT: The pool of 5 verified-open clipper programs from Phase 0.1
# (clipper_programs.yaml) is exactly 5; no elimination round was required.
# This file is a ranking exercise to prioritize ingest cadence and budget
# allocation across the 5, not a cut.

next_recompute: 2026-06-13   # 30 days from capture

methodology_notes:
  twitch_window_days: 30
  youtube_window_days: 90
  tiktok_window_days: 30
  instagram_window_days: 30

  primary_sources:
    - TwitchTracker (https://twitchtracker.com/<creator>)
    - StreamsCharts (https://streamscharts.com/channels/<creator>)
    - SullyGnome (https://sullygnome.com/channel/<creator>)
    - Social Blade (YouTube, TikTok, Instagram)
    - HypeAuditor (cross-platform)

  fallback_sources:
    - VidIQ channel-stats pages
    - Channel page direct (sum recent videos)

  data_quality_note: >
    Most analytics aggregator sites (TwitchTracker, SullyGnome, Social Blade,
    HypeAuditor) return HTTP 403 to direct WebFetch (Cloudflare-gated).
    Numbers below were captured via search-result snippets that quote those
    same aggregators. Where a primary source returned no number after
    reasonable attempts, the field is marked unverified: true and excluded
    from the rank total. Re-runs should attempt verification again with
    direct browser scraping (Playwright) once the operator approves a
    scraping budget.

  twitch_metric_choice: >
    Twitch tracker sites publish "hours watched" rather than "views" as the
    standard 30d aggregation. We use hours-watched as the Twitch view-equivalent
    in the aggregate total, consistent with how creator rankings are normally
    compared across these platforms. This OVERSTATES Twitch relative to TikTok
    (where each scroll = 1 view); a single dedicated viewer can contribute
    hundreds of "hours watched" but only one TikTok view. Operator should
    weight the rank with this asymmetry in mind — Twitch-primary creators
    (Jynxzi) will look larger here in clip-supply terms than their TikTok
    distribution numbers alone would suggest.

  youtube_window_extrapolation: >
    Where only "last 30 days" YouTube views were sourced (most cases — the
    public Social Blade summaries surface 30d, not 90d, in their snippet),
    we multiplied by 3 to estimate 90d. This assumes flat upload cadence;
    flagged in each note. A real 90d figure would require a Social Blade
    paid account or direct Playwright scrape of the daily-views chart.

  kai_cenat_twitch_anomaly: >
    Kai Cenat did NOT stream on Twitch in the trailing 30d window per
    StreamsCharts and SullyGnome (0 hours streamed, 0 hours watched).
    His Twitch number is a verified zero, not unverified — it just means
    his content supply for THIS window came entirely from his YouTube Live
    re-uploads. The clipper pipeline can still ingest his YouTube VODs.

  adin_ross_kick_substitution: >
    Adin Ross's primary live platform is Kick, not Twitch. The Phase 0.1
    clipper-program entry (Adin Ross + N3on joint network) explicitly covers
    Kick-stream content. We populate the "twitch" platform slot with his
    Kick numbers and note the substitution. Twitch (where he was banned and
    only briefly returned) is irrelevant for clip supply.

