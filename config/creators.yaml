# Aggregate summary
summary:
  total_creators_ranked: 5
  data_quality:
    fully_verified_creators: 0       # no creator has 4-of-4 platforms verified
    partially_verified_creators: 5   # all 5 have at least 1 verified platform
    fully_unverified_creators: 0     # required to be 0 — re-run if not

  verified_platform_counts:
    IShowSpeed: 2     # Twitch + YouTube
    Kai_Cenat: 2      # Twitch (verified zero) + YouTube
    Sketch: 2         # Twitch + YouTube
    Jynxzi: 1         # Twitch only
    Adin_Ross: 0      # Kick estimate flagged unverified; main numbers still unverified

  ranking_caveats:
    - "Twitch hours-watched is used as the Twitch view-equivalent (per industry-standard tracker convention) but is NOT directly comparable to TikTok scroll-views. Twitch-primary creators (Jynxzi) are over-represented in clip-supply terms vs distribution terms in this rank."
    - "TikTok 30d views are unverified for ALL 5 creators; Social Blade and HypeAuditor surface those numbers behind their UI but search snippets don't reliably extract them. Next monthly re-run should use Playwright to scrape directly."
    - "Instagram 30d views are unverified for ALL 5 creators; same root cause."
    - "YouTube 90d figures (where verified) are extrapolated 30d × 3, assuming flat upload cadence."
    - "Adin Ross's rank-5 placement reflects DATA QUALITY, not actual reach — his Kick + YouTube + TikTok + IG combined likely ranks him above Sketch and Jynxzi on raw reach. Re-rank after next verification cycle."

  red_flags:
    - "ADIN ROSS CONTENT FIT: His content is gambling-promo-heavy + political/drama-heavy, which directly conflicts with CLAUDE.md's open-question default 'Tolerance for controversial / drama-heavy clips: skip'. The spec default should either be explicitly overridden by the operator (acknowledging higher strike + brand-safety risk) OR Adin Ross should be deprioritized to bottom of rotation despite his potentially-high reach. Recommendation: deprioritize until override is explicit."
    - "SKETCH ECONOMICS: Reported Whop payout of ~$0.35 per 1k views is roughly 5-10x below typical streamer-clip CPMs. Combined with Sketch's collapsed 2026 Twitch viewership (rank #1179 vs his 2024 peak), the unit economics may not justify pipeline cost. Recommendation: pilot 10 Sketch clips before committing budget; treat as A/B candidate, not core rotation."
    - "KAI CENAT TWITCH SUPPLY: Kai didn't stream on Twitch in the last 30d. Pipeline supply this month depends entirely on his YouTube Live VOD channel. If he extends a Twitch hiatus, the spec's expectation of fresh Twitch clips evaporates for our highest-engagement creator. Recommendation: add a 'no fresh source content in 30d' alert to Scout."
    - "TIKTOK / INSTAGRAM DATA GAP: Zero of five creators have verified TikTok or IG 30d view numbers. The aggregate ranking is effectively a Twitch + YouTube ranking right now. Before the next monthly recompute (2026-06-13), the operator should approve a Playwright-based scrape of Social Blade for these two platforms, or pay for one month of Social Blade Premium ($4-$10) to unlock the 30d-views API."
    - "JYNXZI UNDERRANKED: His verified Twitch number (6.95M hours) puts him at rank 4, but his confirmed 10.2M TikTok followers (the 'TikTok-drove-Twitch' growth pattern Wikipedia describes) almost certainly means his TikTok 30d views are 8-figure+. Once verified next cycle, expect Jynxzi to move to rank 2 or 3."
    - "WHOP BRIEF GATING (carries forward from Phase 0.1): 4 of 5 creators (all except Adin Ross) have their per-campaign rules behind a Cloudflare-gated Whop page. Operator must visit each Whop campaign page in a real browser, capture the brief (attribution, watermark, prohibited content), and update clipper_programs.yaml BEFORE the pipeline starts ingesting. Without this, we cannot guarantee program compliance even if the legal-fair-use posture holds."
